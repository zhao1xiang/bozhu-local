version: '3.8'

services:
  web:
    build:
      context: ..
      dockerfile: web-deploy/Dockerfile
    ports:
      - "80:80"
      - "8000:8000"
    volumes:
      - ./data:/app/backend/data
      - ./logs:/app/backend/logs
    environment:
      - DATABASE_URL=/app/backend/data/database.db
    restart: unless-stopped
    container_name: eyecare-web

volumes:
  data:
  logs:
