name: Build Mac Packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-mac:
    name: Build macOS ${{ matrix.arch }}
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: macos-14
          - arch: x86_64
            runner: macos-13

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Show System Info
        run: |
          uname -a
          python --version
          node --version

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build
          cd ..

      - name: Install Backend Dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Backend
        run: |
          cd backend
          pyinstaller build_mac.spec --clean --noconfirm

      - name: Prepare Package
        run: |
          PACKAGE_NAME="simple-web-package-mac-${{ matrix.arch }}"
          mkdir $PACKAGE_NAME

          cp backend/dist/backend_server $PACKAGE_NAME/
          chmod +x $PACKAGE_NAME/backend_server

          cp -r frontend/dist $PACKAGE_NAME/frontend

          cat > $PACKAGE_NAME/start.command << 'EOF'
          #!/bin/bash

          DIR="$( cd "$( dirname "$0" )" && pwd )"
          cd "$DIR"

          xattr -dr com.apple.quarantine backend_server 2>/dev/null
          chmod +x backend_server

          ./backend_server
          EOF

          chmod +x $PACKAGE_NAME/start.command

          zip -r ${PACKAGE_NAME}.zip $PACKAGE_NAME

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-${{ matrix.arch }}
          path: simple-web-package-mac-${{ matrix.arch }}.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: simple-web-package-mac-${{ matrix.arch }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}