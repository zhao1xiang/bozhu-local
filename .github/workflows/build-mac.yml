name: Build Mac Packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-mac:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rosetta
        run: |
          softwareupdate --install-rosetta --agree-to-license

      # ========== ARM 架构构建（保留原有逻辑） ==========
      - name: Setup Python (ARM)
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          architecture: arm64

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build
          cd ..

      - name: Install Backend Dependencies (ARM)
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Backend ARM
        run: |
          cd backend
          pyinstaller build_mac.spec --clean --noconfirm
          mv dist/backend_server dist/backend_server_arm64

      # ========== Intel 架构构建（修复核心） ==========
      - name: Create Intel Python Virtual Env (x86_64)
        run: |
          # 确保 /usr/bin/python3 是 x86_64 架构（通过 Rosetta）
          arch -x86_64 /usr/bin/python3 -m venv ~/intel_venv
          # 激活虚拟环境并验证架构
          source ~/intel_venv/bin/activate
          python --version
          arch -x86_64 python -c "import platform; print('Intel Python arch:', platform.machine())"

      - name: Install Backend Dependencies (Intel)
        run: |
          # 激活 Intel 虚拟环境并安装依赖
          source ~/intel_venv/bin/activate
          cd backend
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Backend Intel
        run: |
          # 激活虚拟环境并打包
          source ~/intel_venv/bin/activate
          cd backend
          pyinstaller build_mac.spec --clean --noconfirm
          mv dist/backend_server dist/backend_server_x86_64
          # 验证产物架构
          lipo -info dist/backend_server_x86_64

      # ========== 打包和上传逻辑（无修改） ==========
      - name: Package ARM
        run: |
          mkdir simple-web-package-mac-arm64

          cp backend/dist/backend_server_arm64 simple-web-package-mac-arm64/backend_server
          chmod +x simple-web-package-mac-arm64/backend_server

          cp -r frontend/dist simple-web-package-mac-arm64/frontend

          cat > simple-web-package-mac-arm64/start.command << 'EOF'
          #!/bin/bash
          DIR="$( cd "$( dirname "$0" )" && pwd )"
          cd "$DIR"

          xattr -dr com.apple.quarantine backend_server 2>/dev/null
          chmod +x backend_server

          ./backend_server
          EOF

          chmod +x simple-web-package-mac-arm64/start.command

          zip -r simple-web-package-mac-arm64.zip simple-web-package-mac-arm64

      - name: Package Intel
        run: |
          mkdir simple-web-package-mac-x86_64

          cp backend/dist/backend_server_x86_64 simple-web-package-mac-x86_64/backend_server
          chmod +x simple-web-package-mac-x86_64/backend_server

          cp -r frontend/dist simple-web-package-mac-x86_64/frontend

          cat > simple-web-package-mac-x86_64/start.command << 'EOF'
          #!/bin/bash
          DIR="$( cd "$( dirname "$0" )" && pwd )"
          cd "$DIR"

          xattr -dr com.apple.quarantine backend_server 2>/dev/null
          chmod +x backend_server

          # 强制用 x86_64 架构运行
          arch -x86_64 ./backend_server
          EOF

          chmod +x simple-web-package-mac-x86_64/start.command

          zip -r simple-web-package-mac-x86_64.zip simple-web-package-mac-x86_64

      - name: Upload ARM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-arm64
          path: simple-web-package-mac-arm64.zip

      - name: Upload Intel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-x86_64
          path: simple-web-package-mac-x86_64.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            simple-web-package-mac-arm64.zip
            simple-web-package-mac-x86_64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}