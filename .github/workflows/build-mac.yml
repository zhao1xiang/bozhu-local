name: Build Mac Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-mac:
    runs-on: macos-13

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build
          cd ..

      - name: Install Backend Dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Backend
        run: |
          cd backend
          pyinstaller build_mac.spec --clean --noconfirm

      - name: Create Package
        run: |
          mkdir simple-web-package-mac

          cp backend/dist/backend_server simple-web-package-mac/
          chmod +x simple-web-package-mac/backend_server

          cp -r frontend/dist simple-web-package-mac/frontend

          cat > simple-web-package-mac/start.command << 'EOF'
          #!/bin/bash
          DIR="$( cd "$( dirname "$0" )" && pwd )"
          cd "$DIR"

          xattr -dr com.apple.quarantine backend_server 2>/dev/null

          chmod +x backend_server
          ./backend_server
          EOF

          chmod +x simple-web-package-mac/start.command

          zip -r simple-web-package-mac.zip simple-web-package-mac

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-package
          path: simple-web-package-mac.zip
