name: Build Mac Intel Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rosetta
        run: |
          softwareupdate --install-rosetta --agree-to-license || true

      - name: Setup Python (Intel)
        run: |
          arch -x86_64 brew install python@3.9
          arch -x86_64 python3.9 -m pip install --upgrade pip

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build
          cd ..

      - name: Install Backend Dependencies
        run: |
          cd backend
          arch -x86_64 python3.9 -m pip install -r requirements.txt
          arch -x86_64 python3.9 -m pip install pyinstaller

      - name: Build Backend (Intel)
        run: |
          cd backend
          arch -x86_64 pyinstaller build_mac.spec --clean --noconfirm

      - name: Create Package
        run: |
          mkdir simple-web-package-mac

          cp backend/dist/backend_server simple-web-package-mac/
          chmod +x simple-web-package-mac/backend_server

          cp -r frontend/dist simple-web-package-mac/frontend

          cat > simple-web-package-mac/start.command << 'EOF'
          #!/bin/bash
          DIR="$( cd "$( dirname "$0" )" && pwd )"
          cd "$DIR"

          xattr -dr com.apple.quarantine backend_server 2>/dev/null

          chmod +x backend_server
          ./backend_server
          EOF

          chmod +x simple-web-package-mac/start.command

          zip -r simple-web-package-mac.zip simple-web-package-mac

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-package
          path: simple-web-package-mac.zip
