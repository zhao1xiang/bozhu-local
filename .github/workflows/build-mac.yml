name: Build Mac Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-mac:
    runs-on: macos-13   # Intel Mac runner（关键）

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build
          cd ..

      - name: Install Backend Dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Backend
        run: |
          cd backend
          pyinstaller build_mac.spec --clean --noconfirm

      - name: Create Package
        run: |
          PACKAGE="simple-web-package-mac"

          mkdir -p $PACKAGE

          cp backend/dist/backend_server $PACKAGE/
          chmod +x $PACKAGE/backend_server

          cp -r frontend/dist $PACKAGE/frontend

          cat > $PACKAGE/start.command << 'EOF'
          #!/bin/bash
          DIR="$( cd "$( dirname "$0" )" && pwd )"
          cd "$DIR"

          xattr -dr com.apple.quarantine backend_server 2>/dev/null

          chmod +x backend_server
          ./backend_server
          EOF

          chmod +x $PACKAGE/start.command

          cat > $PACKAGE/README.txt << 'EOF'
          系统使用说明

          1. 双击 start.command
          2. 浏览器会自动打开系统
          3. 默认账号：admin
          4. 默认密码：admin123
          EOF

          zip -r ${PACKAGE}.zip $PACKAGE

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-package
          path: simple-web-package-mac.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: simple-web-package-mac.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
