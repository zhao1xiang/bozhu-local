name: Build Mac Version

on:
  workflow_dispatch:  # 手动触发
  push:
    tags:
      - 'v*'  # 当推送tag时自动触发

jobs:
  build-mac:
    runs-on: macos-14  # macOS 14+ 使用 Apple Silicon (M1)
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Build Frontend
      run: |
        cd frontend
        npm install
        npm run build
        cd ..
    
    - name: Install Backend Dependencies
      run: |
        cd backend
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build Backend
      run: |
        cd backend
        pyinstaller build_mac.spec --clean --noconfirm
    
    - name: Create Release Package
      run: |
        mkdir -p simple-web-package-mac-v2.1.8
        cp backend/dist/backend_server simple-web-package-mac-v2.1.8/
        chmod +x simple-web-package-mac-v2.1.8/backend_server
        cp -r frontend/dist simple-web-package-mac-v2.1.8/frontend
        
        # 创建启动脚本
        cat > simple-web-package-mac-v2.1.8/启动服务.sh << 'EOF'
        #!/bin/bash
        SCRIPT_DIR="$( cd "$( dirname "${BASH_SOURCE[0]}" )" && pwd )"
        cd "$SCRIPT_DIR"
        ./backend_server
        EOF
        chmod +x simple-web-package-mac-v2.1.8/启动服务.sh
        
        # 创建说明文件
        cat > simple-web-package-mac-v2.1.8/使用说明.txt << 'EOF'
        玻注预约系统 - Mac版 v2.1.8
        
        使用方法：
        1. 双击运行 "启动服务.sh"
        2. 浏览器会自动打开系统页面
        3. 使用 admin/admin123 登录
        
        如有问题，请查看项目文档。
        EOF
    
    - name: Create ZIP
      run: |
        zip -r simple-web-package-mac-v2.1.8.zip simple-web-package-mac-v2.1.8/
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mac-package
        path: simple-web-package-mac-v2.1.8.zip
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: simple-web-package-mac-v2.1.8.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
